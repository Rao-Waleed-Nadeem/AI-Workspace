services:
  postgres:
    image: postgres:17

    container_name: ai-workspace-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}

      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - ./docker/postgres:/var/lib/postgresql/data
